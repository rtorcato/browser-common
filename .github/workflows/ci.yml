name: CI/CD Pipeline

on:
  push:
    branches: [main, release, ci-testing]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip-check.outputs.should-skip }}
    steps:
      - name: Check for skip CI
        id: skip-check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[skip ci]"* || "$COMMIT_MSG" == *"[ci skip]"* ]]; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

  dependencies:
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should-skip != 'true'
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6

      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}
      - name: Run linting
        run: pnpm lint

  commitlint:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}
      - name: Validate latest commit message
        run: git log -1 --pretty=format:"%s" | npx commitlint

  typecheck:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}
      - name: Type check
        run: pnpm typecheck

  varcheck:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: Check environment variables
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GITHUB_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN is not set - required for publishing"
          fi

  test:
    runs-on: ubuntu-latest
    needs: [check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        if: matrix.node-version != '22'
        run: pnpm test --run
      - name: Run tests with coverage
        if: matrix.node-version == '22'
        run: pnpm coverage
      - name: Upload coverage
        if: matrix.node-version == '22'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/coverage-summary.json
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}
      - name: Build project
        run: pnpm build-prod
      - name: Check bundle size budgets
        run: pnpm size
      - name: Validate package types resolution (attw)
        run: pnpm attw
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            README.md
            pnpm-lock.yaml
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [dependencies, lint, typecheck, test, build, varcheck, check-skip]
    if: |
      always() &&
      needs.check-skip.outputs.should-skip != 'true' &&
      github.ref == 'refs/heads/main' &&
      needs.dependencies.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success' &&
      needs.varcheck.result == 'success'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Build
        run: pnpm run build-prod
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
