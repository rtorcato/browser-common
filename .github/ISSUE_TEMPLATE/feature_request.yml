name: Feature request
description: Propose a new module, function, or change to an existing wrapper.
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What and why
      description: What's the missing capability, and what use case prompted it?
    validations:
      required: true
  - type: input
    id: api
    attributes:
      label: Underlying Web API
      description: MDN link if applicable.
      placeholder: "https://developer.mozilla.org/en-US/docs/Web/API/..."
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Function signatures or example usage.
      render: ts
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
